<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InkMaster — Studio Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <div>
            <div class="logo-title">PLAN'INK</div>
            <div class="logo-sub">Studio Manager</div>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-item active" data-page="dashboard">
            <span class="nav-icon">📊</span>
            <span>Tableau de Bord</span>
          </button>
          <button class="nav-item" data-page="clients">
            <span class="nav-icon">👥</span>
            <span>Clients</span>
          </button>
          <button class="nav-item" data-page="agenda">
            <span class="nav-icon">📅</span>
            <span>Agenda</span>
          </button>
          <button class="nav-item" data-page="stocks">
            <span class="nav-icon">📦</span>
            <span>Stocks</span>
          </button>
          <button class="nav-item" data-page="contrats">
            <span class="nav-icon">📄</span>
            <span>Contrats</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="artist-card">
            <div class="artist-avatar">TK</div>
            <div>
              <div class="artist-name">The Artist</div>
              <div class="artist-status">● En ligne</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main">
        <div id="page-dashboard" class="page active">
          <!-- injected by JS -->
        </div>
        <div id="page-clients" class="page">
          <!-- injected by JS -->
        </div>
        <div id="page-agenda" class="page">
          <!-- injected by JS -->
        </div>
        <div id="page-stocks" class="page">
          <!-- injected by JS -->
        </div>
        <div id="page-contrats" class="page">
          <!-- injected by JS -->
        </div>
      </main>
    </div>

    <!-- Modal container -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-box" class="modal-box">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modal-content"></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="batches.js"></script>
    <script src="dashboard.js"></script>
    <script src="clients.js"></script>
    <script src="agenda.js"></script>
    <script src="stocks.js"></script>
    <script src="contrats.js"></script>
  </body>
</html>
